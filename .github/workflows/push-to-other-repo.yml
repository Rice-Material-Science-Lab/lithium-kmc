name: Compile WASM and Push to Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "latest"

      - name: Compile C++ to WASM
        run: |
          emcc lkmc-wasm.cpp -O3 --bind -sMODULARIZE -sEXPORT_ES6 -sALLOW_MEMORY_GROWTH -o lkmc-wasm.js

      - name: Push Build Artifacts to Destination Repo
        env:
          DEST_PAT: ${{ secrets.UPDATE_WASM_PAT }}
        run: |
          # Clone the repo into a temp folder
          git clone https://x-access-token:${DEST_PAT}@github.com/Rice-Material-Science-Lab/lithium-website.git dest-repo

          # Copy js and wasm files into the public folder
          mkdir -p dest-repo/public/
          cp lkmc-wasm.js dest-repo/public/
          cp lkmc-wasm.wasm dest-repo/public/

          # Commit and push changes
          cd dest-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/lkmc-wasm.js public/lkmc-wasm.wasm

          # Only commit if changes actually exist to avoid failing the workflow step
          git diff-index --quiet HEAD || git commit -m "Automated WASM build update"
          git push origin main
